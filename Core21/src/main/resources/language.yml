no-permissions: "<red>No Permissions"
required-player: "<red>You must be a player in order to execute this command."

balance:
  balance: "<purple>Balance: <yellow>{balance}"

faction:
  usage:
    - ""
    - "&c/faction create <name>"
    - "&c/faction disband <name>"
    - "&c/faction show <name>"
    - ""
  created: "&eTeam &b{faction} &ehas been &acreated &eby &6{leader}"
  disbanded: "&eTeam &b{faction} &ehas been &ccreated &eby &6{leader}"
  already-exists: "&cFaction {faction} already exists."
  in-faction: "&cYou are already in faction."
  no-faction: "&cYou aren't in a faction."
  not-leader: "&cYou must be a leader."
  not-exists: "&c{faction} faction does not exists."
  player-faction-show:
    - "&1{faction} &7[{online}/{size}] &b- &eHQ&f: {hq}"
    - ""
    - "&eBalance: &1${balance}"
    - "&eDeaths till Raidable: {dtr}"
  faction-show:
    - "&1{faction}"
    - "&b- &eLocation&f: {location}"
    - ""